apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"
apply plugin: "com.google.dagger.hilt.android"
apply plugin: "org.jetbrains.kotlin.kapt"

// Android Studio / Gradle often run with a minimal PATH, so `node` is missing when Node comes
// from Homebrew, nvm, Volta, etc. Override with env NODE_BINARY if this resolver misses yours.
def resolveNodeBinaryForReactNative() {
    def fromEnv = System.getenv("NODE_BINARY")
    if (fromEnv != null && !fromEnv.trim().isEmpty()) {
        return fromEnv.trim()
    }
    def home = System.getProperty("user.home")
    def os = System.getProperty("os.name").toLowerCase()
    def candidates = []
    if (os.contains("windows")) {
        def pf = System.getenv("ProgramFiles")
        if (pf != null) candidates.add(new File(pf, "nodejs/node.exe").path)
        def apf = System.getenv("ProgramFiles(x86)")
        if (apf != null) candidates.add(new File(apf, "nodejs/node.exe").path)
    } else {
        candidates.add("/opt/homebrew/bin/node")
        candidates.add("/usr/local/bin/node")
        candidates.add(new File(home, ".volta/bin/node").path)
        candidates.add(new File(home, ".asdf/shims/node").path)
        def nvmRoot = new File(home, ".nvm/versions/node")
        if (nvmRoot.isDirectory()) {
            def dirs = nvmRoot.listFiles()?.findAll { it.isDirectory() }?.sort { a, b -> b.name <=> a.name }
            if (dirs) {
                def n = new File(dirs[0], "bin/node")
                if (n.exists()) candidates.add(0, n.absolutePath)
            }
        }
    }
    for (path in candidates) {
        if (path != null && new File(path).exists()) {
            return path
        }
    }
    return "node"
}

react {
    autolinkLibrariesWithApp()
    nodeExecutableAndArgs.set([resolveNodeBinaryForReactNative()])
}

def enableProguardInReleaseBuilds = false
def jscFlavor = 'io.github.react-native-community:jsc-android:2026004.+'

android {
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    namespace "com.boltearth.rnuibridge"
    defaultConfig {
        applicationId "com.boltearth.rnuibridge"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0"
        vectorDrawables.useSupportLibrary = true
    }
    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
    }
    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            signingConfig signingConfigs.debug
            minifyEnabled enableProguardInReleaseBuilds
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    kotlinOptions {
        jvmTarget = "17"
    }
    buildFeatures {
        // Required at runtime: SDK (and :boltearth-rnsdk) use generated Data Binding; without this,
        // androidx.databinding.DataBinderMapperImpl is missing from the APK.
        dataBinding true
    }
}

kapt {
    correctErrorTypes true
}

dependencies {
    implementation("com.facebook.react:react-android")

    // Needed for compile-only Hilt *LazyMapKey shims (bolt-earth-ui-sdk AAR omits them; see Hilt ASM on the library module).
    implementation("io.github.boltearth:bolt-earth-ui-sdk:1.0.0") {
        exclude group: "com.github.theGlenn.flipper-android-no-op", module: "soloadernoop"
    }

    implementation("com.google.dagger:hilt-android:2.54")
    kapt("com.google.dagger:hilt-android-compiler:2.54")

    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }
}
