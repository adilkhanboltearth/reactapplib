plugins {
    id("com.android.library")
    id("org.jetbrains.kotlin.android")
    id("org.jetbrains.kotlin.kapt")
    id("com.google.dagger.hilt.android")
}

def safeExt(String name, def fallback) {
    return rootProject.ext.has(name) ? rootProject.ext.get(name) : fallback
}

android {
    compileSdk safeExt("compileSdkVersion", 36)
    namespace "com.boltearth.reactnativesdk"

    defaultConfig {
        minSdkVersion safeExt("minSdkVersion", 24)
        targetSdkVersion safeExt("targetSdkVersion", 36)
        vectorDrawables.useSupportLibrary = true
    }

    buildFeatures {
        dataBinding true
        buildConfig true
        viewBinding true
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }
}

kapt {
    correctErrorTypes true
}

dependencies {
    compileOnly("com.facebook.react:react-android")

    implementation("org.jetbrains.kotlinx:kotlinx-coroutines-android:1.8.1")

    implementation("androidx.appcompat:appcompat:1.7.0")
    implementation("com.google.android.material:material:1.13.0")
    implementation("androidx.constraintlayout:constraintlayout:2.2.0")
    implementation("androidx.navigation:navigation-fragment-ktx:2.8.4")
    implementation("androidx.navigation:navigation-ui-ktx:2.8.4")

    implementation("com.google.dagger:hilt-android:2.54")
    kapt("com.google.dagger:hilt-android-compiler:2.54")

    implementation("io.github.boltearth:bolt-earth-ui-sdk:1.0.0") {
        exclude group: "com.github.theGlenn.flipper-android-no-op", module: "soloadernoop"
    }
}
